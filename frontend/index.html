<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crate PDF Manual Generator - Windows XP Luna</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="xp-window">
    <!-- XP Title Bar -->
    <div class="xp-titlebar" data-tauri-drag-region>
      <div class="xp-title-icon" data-tauri-drag-region>
        <img src="icon.png" width="16" height="16" alt="Icon" data-tauri-drag-region />
      </div>
      <span class="xp-title-text" data-tauri-drag-region>Crate PDF Manual Generator (Tauri Luna Edition)</span>
      <div class="xp-titlebar-buttons">
        <button class="xp-btn-min" id="min-btn">_</button>
        <button class="xp-btn-close" id="close-btn">X</button>
      </div>
    </div>

    <!-- XP Window Content -->
    <div class="xp-content">
      <!-- Search Crate -->
      <fieldset class="xp-fieldset">
        <legend>Buscar Crate</legend>
        <div class="xp-field-row">
          <label for="crate-name">Nome da crate no crates.io:</label>
          <div class="xp-search-input-group">
            <input type="text" id="crate-name" placeholder="Ex: serde, tokio, regex, rand..." autofocus />
            <button class="xp-button" id="search-btn">Buscar</button>
          </div>
        </div>
      </fieldset>

      <!-- Options -->
      <div class="xp-options-row">
        <label class="xp-checkbox-container">
          <input type="checkbox" id="translate-checkbox" />
          <span class="xp-checkbox-label">Traduzir documentação para o Português (Google Translate)</span>
        </label>
      </div>

      <!-- Status and Progress -->
      <fieldset class="xp-fieldset">
        <legend>Progresso e Operação</legend>
        <div class="xp-status-row">
          <span id="status-label">Pronto. Digite a crate desejada.</span>
          <span id="timer-label">(0.0s)</span>
        </div>
        <div class="xp-progress-container">
          <div class="xp-progress-bar" id="progress-bar">
            <!-- XP green progress blocks will be dynamically generated by JS -->
          </div>
        </div>
      </fieldset>

      <!-- Search Results -->
      <fieldset class="xp-fieldset results-fieldset">
        <legend>Crates Encontradas</legend>
        <div class="xp-listview-container">
          <table class="xp-listview">
            <thead>
              <tr>
                <th class="col-name">Crate</th>
                <th class="col-desc">Descrição</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr>
                <td colspan="2" class="xp-listview-empty">Nenhum resultado. Digite um termo e clique em "Buscar".</td>
              </tr>
            </tbody>
          </table>
        </div>
      </fieldset>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
